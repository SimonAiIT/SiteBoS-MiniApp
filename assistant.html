<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TrinAI OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #212D67; --accent: #895FE0; --bg: #f4f7f9;
            --chat-user: #e3f2fd; --chat-ai: #ffffff; --danger: #ff4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); overflow: hidden; height: 100vh; position: relative; }

        /* --- NAVIGAZIONE A SCHERMI (SWIPE) --- */
        #viewport {
            display: flex; width: 300vw; height: 100vh;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform: translateX(-100vw); /* Inizia sullo schermo centrale (Chat) */
        }
        .screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* --- HEADER COMUNE --- */
        header {
            background: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); z-index: 100;
        }
        .agent-info { text-align: center; cursor: pointer; }
        .agent-info h1 { font-size: 16px; color: var(--primary); }
        .agent-info p { font-size: 11px; color: #888; }

        /* --- SCHERMO 1: STORICO (SINISTRA) --- */
        #screen-history { background: #fff; padding: 20px; }
        .thread-item { 
            padding: 15px; border-radius: 12px; background: var(--bg); margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee;
        }
        .thread-item.active { border-color: var(--accent); background: #f0ebff; }

        /* --- SCHERMO 2: CHAT (CENTRO) --- */
        #chat-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 15px; position: relative; }
        .message.user { align-self: flex-end; background: var(--chat-user); border-bottom-right-radius: 2px; }
        .message.ai { align-self: flex-start; background: var(--chat-ai); border-bottom-left-radius: 2px; border: 1px solid #ddd; }

        /* --- SCHERMO 3: VOCALE (DESTRA) --- */
        #screen-voice { background: linear-gradient(180deg, #212D67 0%, #101530 100%); color: white; justify-content: center; align-items: center; }
        .mic-sphere {
            width: 150px; height: 150px; background: var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 50px;
            box-shadow: 0 0 30px rgba(137, 95, 224, 0.5); cursor: pointer;
        }
        .mic-sphere.recording { animation: pulse 1.5s infinite; background: var(--danger); }

        /* --- FOOTER INPUT --- */
        footer { background: #fff; padding: 10px 15px; display: flex; gap: 10px; align-items: center; padding-bottom: env(safe-area-inset-bottom, 15px); }
        #chat-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 12px; outline: none; }
        .icon-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--primary); cursor: pointer; }

        /* --- MENU AGENTI (SIDE DRAWER) --- */
        #agent-drawer {
            position: fixed; top: 0; left: 0; width: 260px; height: 100%; background: #fff;
            transform: translateX(-100%); transition: 0.3s; z-index: 1000; box-shadow: 5px 0 15px rgba(0,0,0,0.1);
        }
        body.drawer-open #agent-drawer { transform: translateX(0); }
        .drawer-item { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- MENU AGENTI -->
    <nav id="agent-drawer">
        <div style="padding: 20px; font-weight: bold; background: var(--primary); color: #fff;">Direzione Aziendale</div>
        <div class="drawer-item" onclick="switchAgent('pm')"><i class="fas fa-tasks"></i> Gestione Lavori</div>
        <div class="drawer-item" onclick="switchAgent('mkt')"><i class="fas fa-bullhorn"></i> Vendite & Promo</div>
        <div class="drawer-item" onclick="switchAgent('hr')"><i class="fas fa-shield-alt"></i> Team & Sicurezza</div>
        <div class="drawer-item" onclick="switchAgent('acc')"><i class="fas fa-wallet"></i> Cassa & Conti</div>
        <div class="drawer-item" onclick="openSolver()"><i class="fas fa-route"></i> 🚗 Risolvi Percorso</div>
    </nav>

    <div id="viewport">
        <!-- 1. SCHERMO STORICO -->
        <section class="screen" id="screen-history">
            <header>
                <button class="header-btn" onclick="toggleDrawer()"><i class="fas fa-bars"></i></button>
                <div class="header-title"><b>Archivio Chat</b></div>
                <div style="width:30px"></div>
            </header>
            <div id="thread-list" style="padding: 15px;">
                <!-- Populate via JS -->
            </div>
            <button onclick="createNewThread()" style="margin: 20px; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white;">+ Nuova Discussione</button>
        </section>

        <!-- 2. SCHERMO CHAT CENTRALE -->
        <section class="screen" id="screen-main">
            <header>
                <button class="header-btn" onclick="goToScreen(0)"><i class="fas fa-history"></i></button>
                <div class="agent-info" onclick="renameCurrentThread()">
                    <h1 id="ui-agent-name">🛠️ Gestione Lavori</h1>
                    <p id="ui-thread-name">Discussione Attiva</p>
                </div>
                <button class="header-btn" onclick="goToScreen(2)"><i class="fas fa-microphone"></i></button>
            </header>
            
            <main id="chat-container"></main>

            <footer>
                <input type="text" id="chat-input" placeholder="Chiedi all'AI...">
                <div id="btn-send" class="icon-btn" onclick="sendText()"><i class="fas fa-paper-plane"></i></div>
            </footer>
        </section>

        <!-- 3. SCHERMO VOCALE -->
        <section class="screen" id="screen-voice">
            <header style="background: transparent; color: white;">
                <button class="header-btn" style="color:white" onclick="goToScreen(1)"><i class="fas fa-chevron-left"></i> Torna alla Chat</button>
            </header>
            <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                <div id="voice-status" style="margin-bottom: 30px; font-size: 18px; font-weight: 300;">Tocca per parlare</div>
                <div id="mic-btn" class="mic-sphere">
                    <i class="fas fa-microphone"></i>
                </div>
                <div id="audio-feedback" style="margin-top: 50px; width: 80%; text-align: center; font-style: italic; opacity: 0.7;"></div>
            </div>
        </section>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const WH_CHAT = "https://prod.workflow.trinai.it/webhook/81ab5292-43c3-4f93-afaf-7411b95fc010";
        const WH_SOLVER = "https://trinai.api.workflow.dcmake.it/webhook/a0b6b2cb-4e19-4a92-9269-6b6d8a7afb80";

        let currentAgent = 'pm';
        let currentThreadId = 'thread_001';
        let currentScreen = 1;

        // --- GESTIONE SWIPE ---
        let startX;
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            const endX = e.changedTouches[0].clientX;
            const diff = startX - endX;
            if (Math.abs(diff) > 80) {
                if (diff > 0 && currentScreen < 2) goToScreen(currentScreen + 1);
                else if (diff < 0 && currentScreen > 0) goToScreen(currentScreen - 1);
            }
        });

        function goToScreen(index) {
            currentScreen = index;
            document.getElementById('viewport').style.transform = `translateX(-${index * 100}vw)`;
        }

        function toggleDrawer() { document.body.classList.toggle('drawer-open'); }

        // --- LOGICA AGENTI & THREAD ---
        function switchAgent(agent) {
            currentAgent = agent;
            const names = { pm: "🛠️ Gestione Lavori", mkt: "🚀 Vendite & Promo", hr: "🛡️ Team & Sicurezza", acc: "💰 Cassa & Conti" };
            document.getElementById('ui-agent-name').innerText = names[agent];
            toggleDrawer();
            loadThreads();
        }

        function renameCurrentThread() {
            const newName = prompt("Inserisci il nuovo nome della discussione:");
            if (newName) {
                document.getElementById('ui-thread-name').innerText = newName;
                callApi(WH_CHAT, { action: "rename_thread", new_name: newName });
            }
        }

        // --- COMUNICAZIONE ---
        async function callApi(url, payload) {
            const fullPayload = { 
                ...payload, 
                agent_id: currentAgent, 
                thread_id: currentThreadId,
                user_id: tg.initDataUnsafe?.user?.id || 'TEST'
            };
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(fullPayload)
            });
            const data = await response.json();
            if (data.reply) addMessage('ai', data.reply);
            if (data.audio_base64) playAudio(data.audio_base64);
        }

        function sendText() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            addMessage('user', text);
            input.value = '';
            callApi(WH_CHAT, { action: "npl_chat", message: text });
        }

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            document.getElementById('chat-container').appendChild(div);
            document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
        }

        // --- LOGICA VOCALE (Push-to-Talk) ---
        const micBtn = document.getElementById('mic-btn');
        let mediaRecorder;
        let audioChunks = [];

        micBtn.onmousedown = startRecording;
        micBtn.onmouseup = stopRecording;
        micBtn.ontouchstart = (e) => { e.preventDefault(); startRecording(); };
        micBtn.ontouchend = (e) => { e.preventDefault(); stopRecording(); };

        async function startRecording() {
            micBtn.classList.add('recording');
            document.getElementById('voice-status').innerText = "Ti ascolto...";
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => {
                    const base64 = reader.result.split(',')[1];
                    callApi(WH_CHAT, { action: "npl_voice", audio_base64: base64, mime_type: "audio/webm" });
                };
                audioChunks = [];
            };
            mediaRecorder.start();
        }

        function stopRecording() {
            micBtn.classList.remove('recording');
            document.getElementById('voice-status').innerText = "Analisi voce...";
            mediaRecorder.stop();
        }

        function playAudio(base64) {
            const audio = new Audio("data:audio/webm;base64," + base64);
            audio.play();
        }

        // --- RISOLUTORE (LOGISTICA) ---
        function openSolver() {
            toggleDrawer();
            // Qui carichiamo dinamicamente il form che hai creato tu
            // Per semplicità lo mostriamo come un overlay
            tg.showPopup({
                title: "Logistica",
                message: "Vuoi aprire il modulo di pianificazione percorso?",
                buttons: [{text: "Apri", type: "default"}, {text: "Annulla", type: "cancel"}]
            }, (id) => {
                if (id === "default") {
                    // Reindirizza al tuo file solver.html o iniettalo nel DOM
                    window.location.href = "solver.html"; 
                }
            });
        }
    </script>
</body>
</html>
