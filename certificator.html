<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrinAI Certificator</title>
    <!-- SDK ufficiale Telegram Mini Apps -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #1a1e24;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo {
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 10px;
            color: #212D67;
        }
        .status-text {
            font-size: 16px;
            margin-bottom: 20px;
            color: #4A4A4A;
        }
        
        /* Stili per il video (fotocamera) */
        #camera-feed {
            display: none;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            background-color: #000;
            object-fit: cover;
        }

        .action-btn {
            background-color: #212D67;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            margin: 5px;
            width: 80%;
            max-width: 300px;
        }
        .action-btn:active {
            transform: scale(0.95);
        }
        
        #snapBtn {
            display: none;
            background-color: #E63946; /* Rosso per lo scatto */
        }

        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #212D67;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">TrinAI Certificator</div>
        <div id="status" class="status-text">Pronto per l'acquisizione evidenza live</div>
        
        <!-- AGGIUNTO: muted e webkit-playsinline fondamentali per iOS/Telegram WebView -->
        <video id="camera-feed" autoplay playsinline webkit-playsinline muted></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <button id="startBtn" class="action-btn" onclick="startCamera()">
            📸 ATTIVA FOTOCAMERA
        </button>

        <button id="snapBtn" class="action-btn" onclick="takePhoto()">
            🔴 SCATTA E INVIA
        </button>

        <div id="loader" class="loader"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const statusText = document.getElementById('status');
        const loader = document.getElementById('loader');
        const startBtn = document.getElementById('startBtn');
        const snapBtn = document.getElementById('snapBtn');
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('canvas');
        
        let videoStream = null;

        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return Object.fromEntries(params.entries());
        }

        async function startCamera() {
            try {
                startBtn.style.display = 'none';
                loader.style.display = 'block';
                statusText.innerText = 'Avvio fotocamera in corso...';

                // Richiesta permessi: chiediamo esplicitamente di disattivare l'audio
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' },
                    audio: false 
                });
                
                videoStream = stream;
                video.srcObject = stream;

                // Aspettiamo che il video sia effettivamente caricato e in riproduzione
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        loader.style.display = 'none';
                        video.style.display = 'block';
                        snapBtn.style.display = 'block';
                        statusText.innerText = 'Inquadra l\'evidenza...';
                    }).catch(e => {
                        console.error("Errore play video:", e);
                        statusText.innerText = '❌ Errore riproduzione video.';
                    });
                };

            } catch (err) {
                console.error("Errore accesso fotocamera: ", err);
                loader.style.display = 'none';
                startBtn.style.display = 'block';
                statusText.innerText = '❌ Errore fotocamera. Controlla i permessi.';
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    alert("Devi concedere i permessi della fotocamera a Telegram per continuare.");
                }
            }
        }

        function takePhoto() {
            // Controllo di sicurezza: verifichiamo che il video abbia dimensioni valide
            if (video.videoWidth === 0 || video.videoHeight === 0) {
                alert("La fotocamera si sta ancora inizializzando. Attendi un secondo.");
                return;
            }

            snapBtn.style.display = 'none';
            loader.style.display = 'block';
            statusText.innerText = 'Criptazione e invio evidenza in corso...';

            // Imposta le dimensioni del canvas uguali a quelle reali del video
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            
            // Disegna il frame corrente
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const dataURL = canvas.toDataURL('image/jpeg', 0.8);
            const base64Content = dataURL.split(',')[1];
            
            // Spegne la fotocamera per risparmiare risorse
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
            }

            sendData(base64Content);
        }

        function sendData(base64Content) {
            const urlData = getUrlParams();
            const payload = {
                action: "certificator",
                timestamp: new Date().toISOString(),
                base64_content: base64Content,
                mime_type: "image/jpeg",
                file_name: "evidenza_" + Date.now() + ".jpg",
                ...urlData
            };

            fetch('https://prod.workflow.trinai.it/webhook/ef4aece4-9ec0-4026-a7a7-328562bcbdf6', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    statusText.innerText = '✅ Certificazione Inviata!';
                    loader.style.display = 'none';
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => { tg.close(); }, 1500);
                } else {
                    throw new Error('Errore server');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                statusText.innerText = '❌ Errore durante l\'invio. Riprova.';
                startBtn.style.display = 'block'; 
                loader.style.display = 'none';
            });
        }
    </script>
</body>
</html>
